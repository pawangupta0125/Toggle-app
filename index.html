<!DOCTYPE html>
<html>
<head>
<title>Toggle App</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
}

#box{
    width:200px;
    height:200px;
    background-color:red;
    margin:auto;
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>

<body>

<h2>HTML Toggle App</h2>

<div id="box"></div>

<button onclick="toggleColor()">Toggle</button>

<script>
function toggleColor(){
let box = document.getElementById("box");

if(box.style.backgroundColor === "red"){
box.style.backgroundColor = "green";
}
else{
box.style.backgroundColor = "red";
}
}
</script>

</body>
</html>
